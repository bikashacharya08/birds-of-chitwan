<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birds of Chitwan National Park</title>
    <meta name="description" content="A comprehensive checklist of birds found in Chitwan National Park.">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="animated-bg"></div>
    
    <nav class="navbar">
        <div class="logo">Chitwan<span>Avian</span></div>
        <div class="search-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="search-icon"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <input type="text" id="searchInput" placeholder="Search by English, Scientific, or Nepali name..." autocomplete="off">
        </div>
    </nav>

    <header class="hero-section">
        <h1>Avian Checklist</h1>
        <p>Discover the incredible biodiversity of Chitwan National Park.</p>
        <div class="stats">
            <div class="stat-badge"><span id="total-count">0</span> Species</div>
        </div>
    </header>

    <main class="container">
        <div class="bird-list" id="bird-list">
            <!-- Cards injected by JS -->
        </div>
    </main>

    <script src="birds_data.js"></script>
    <script src="script.js"></script>
</body>
</html>
