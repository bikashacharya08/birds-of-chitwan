<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CNP Field Guide — Birds of Chitwan</title>
    <meta name="description" content="A field guide to the birds of Chitwan National Park for wildlife guides.">
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Top bar -->
    <header class="topbar">
        <div class="topbar-inner">
            <div class="brand">
                <span class="brand-icon">🦜</span>
                <div>
                    <div class="brand-title">CNP Field Guide</div>
                    <div class="brand-sub">Birds of Chitwan National Park</div>
                </div>
            </div>
            <div class="search-box">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input id="searchInput" type="text" placeholder="Search birds…" autocomplete="off">
            </div>
            <div class="species-count"><span id="count-display">0</span> species</div>
        </div>
    </header>

    <!-- Family filter -->
    <div class="pill-bar">
        <div class="pills" id="pills">
            <button class="pill active" data-family="All">All</button>
        </div>
    </div>

    <!-- List -->
    <main class="book" id="book">
        <!-- Injected by JS -->
    </main>

    <footer class="foot">
        Birds of Chitwan National Park · Nepal · UNESCO World Heritage Site
    </footer>

    <script src="birds_data.js"></script>
    <script src="script.js"></script>
</body>
</html>
